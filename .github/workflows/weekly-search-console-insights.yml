name: Weekly Search Console Insights

on:
  schedule:
    - cron: "30 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  search-console-insights:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip google-auth

      - name: Write service account credentials
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GSC_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GSC_SERVICE_ACCOUNT_JSON secret." >&2
            exit 1
          fi
          printf '%s' "$GSC_SERVICE_ACCOUNT_JSON" > gsc-service-account.json

      - name: Generate Search Console report
        env:
          GSC_PROPERTY_URL: ${{ vars.GSC_PROPERTY_URL }}
          GSC_CREDENTIALS_FILE: gsc-service-account.json
        run: python scripts/search_console_insights.py

      - name: Upload Search Console report
        uses: actions/upload-artifact@v4
        with:
          name: search-console-insights
          path: search-console-report.md

      - name: Create issue when workflow fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.existsSync("search-console-report.md")
              ? fs.readFileSync("search-console-report.md", "utf8")
              : "The Search Console workflow failed before the report could be generated. Check the workflow logs and verify secrets and property access.";
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Search Console automation alert - ${new Date().toISOString().slice(0, 10)}`,
              body
            });
